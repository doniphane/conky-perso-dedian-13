conky.config = {
    -- Position et taille
    alignment = 'top_right',
    gap_x = 30,
    gap_y = 60,
    minimum_width = 280,
    maximum_width = 280,
    
    -- Apparence
    background = true,
    border_width = 0,
    draw_borders = false,
    draw_outline = false,
    draw_shades = false,
    draw_graph_borders = false,
    
    -- Couleurs et transparence
    default_color = 'ffffff',
    default_outline_color = 'white',
    default_shade_color = 'black',
    color1 = '88c0d0',  -- Bleu clair
    color2 = 'a3be8c',  -- Vert
    color3 = 'bf616a',  -- Rouge
    color4 = 'ebcb8b',  -- Jaune
    
    -- Fenêtre
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    
    -- Police
    use_xft = true,
    font = 'Roboto:size=10',
    xftalpha = 0.8,
    
    -- Performances
    update_interval = 2.0,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    no_buffers = true,
    double_buffer = true,
    
    -- Autres
    uppercase = false,
    use_spacer = 'none',
    show_graph_scale = false,
    show_graph_range = false,
}

conky.text = [[
${alignc}${color1}${font Roboto:size=32}${time %H:%M}${font}
${alignc}${color}${time %A %d %B %Y}

${color1}SYSTÈME ${hr 2}${color}
${color2}OS:${color} ${execi 86400 lsb_release -d | cut -f 2}
${color2}Kernel:${color} ${kernel}
${color2}Uptime:${color} ${uptime}

${color1}CPU ${hr 2}${color}
${color2}Processeur:${color} ${freq_g}GHz
${color2}Utilisation:${color} ${cpu}%
${cpugraph 40,280 a3be8c 5e81ac}
${color2}Core 1:${color} ${cpu cpu1}% ${cpubar cpu1 6,120}
${color2}Core 2:${color} ${cpu cpu2}% ${cpubar cpu2 6,120}
${color2}Core 3:${color} ${cpu cpu3}% ${cpubar cpu3 6,120}
${color2}Core 4:${color} ${cpu cpu4}% ${cpubar cpu4 6,120}

${color1}MÉMOIRE ${hr 2}${color}
${color2}RAM:${color} $mem / $memmax
${membar 8}
${color2}Swap:${color} $swap / $swapmax
${swapbar 8}

${color1}DISQUE ${hr 2}${color}
${color2}/:${color} ${fs_used /} / ${fs_size /}
${fs_bar 8 /}
${color2}I/O:${color} ${diskio}
${diskiograph 40,280 a3be8c 5e81ac}

${color1}RÉSEAU ${hr 2}${color}
${if_existing /proc/net/route enp0s3}\
${color2}Ethernet:${color} ${addr enp0s3}
${color2}↓:${color} ${downspeed enp0s3}/s ${alignr}${color2}↑:${color} ${upspeed enp0s3}/s
${downspeedgraph enp0s3 30,135 a3be8c 5e81ac} ${upspeedgraph enp0s3 30,135 a3be8c 5e81ac}
${else}${color3}Déconnecté${color}${endif}

${color1}TOP PROCESSUS ${hr 2}${color}
${color2}Nom${goto 180}CPU%${alignr}MEM%${color}
${top name 1}${goto 180}${top cpu 1}${alignr}${top mem 1}
${top name 2}${goto 180}${top cpu 2}${alignr}${top mem 2}
${top name 3}${goto 180}${top cpu 3}${alignr}${top mem 3}
${top name 4}${goto 180}${top cpu 4}${alignr}${top mem 4}
${top name 5}${goto 180}${top cpu 5}${alignr}${top mem 5}
]]
