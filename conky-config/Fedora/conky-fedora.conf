conky.config = {
    
    alignment = 'top_right',
    gap_x = 30,
    gap_y = 60,
    minimum_width = 300,
    maximum_width = 300,
    
    -- Apparence
    background = true,
    border_width = 1,
    draw_borders = true,
    draw_outline = false,
    draw_shades = true,
    draw_graph_borders = true,
    
    -- Couleurs Fedora (bleu foncé/clair + accents)
    default_color = 'e8e8e8',
    default_outline_color = 'white',
    default_shade_color = '0b1015',
    color1 = '3c6eb4',  -- Bleu Fedora principal
    color2 = '51a2da',  -- Bleu clair Fedora
    color3 = 'f17a65',  -- Orange accent
    color4 = 'a0d995',  -- Vert accent
    color5 = '294172',  -- Bleu foncé
    
    -- Fenêtre avec style Fedora
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 200,
    own_window_colour = '0f1419',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    
    -- Police
    use_xft = true,
    font = 'Roboto:size=9',
    xftalpha = 0.9,
    
    -- Performances
    update_interval = 2.0,
    cpu_avg_samples = 2,
    net_avg_samples = 2,
    no_buffers = true,
    double_buffer = true,
    
    -- Autres
    uppercase = false,
    use_spacer = 'none',
    show_graph_scale = false,
    show_graph_range = false,
    
    -- Script Lua pour détection automatique
    lua_load = '/home/noelson/.config/conky/conky-auto.lua',
}

conky.text = [[
${alignc}${color1}╔═══════════════════════════════╗
